name: Build Custom APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install apktool
        run: sudo apt-get install -y apktool

      - name: Download Via Browser APK
        run: wget -q https://res.viayoo.com/v1/via-release.apk -O via-release.apk

      - name: Decompile APK
        run: apktool d via-release.apk -o via-decompiled --no-res

      - name: Show homepage references
        run: |
          grep -r "about:home\|about:blank\|homepage\|startUrl\|start_url\|default_url" via-decompiled/ --include="*.smali" --include="*.xml" -l || true
          grep -r "about:home" via-decompiled/ --include="*.smali" -n | head -20

      - name: Replace homepage with Gemini
        run: |
          # Substituir about:home pelo Gemini
          find via-decompiled/ -type f -name "*.smali" \
            -exec sed -i 's|about:home|https://gemini.google.com/app|g' {} \;
          find via-decompiled/ -type f -name "*.smali" \
            -exec sed -i 's|about:blank|https://gemini.google.com/app|g' {} \;
          find via-decompiled/ -type f -name "*.xml" \
            -exec sed -i 's|about:home|https://gemini.google.com/app|g' {} \;
          # Verificar substituição
          echo "=== Verificando substituição ==="
          grep -r "gemini.google.com" via-decompiled/ --include="*.smali" | head -5

      - name: Recompile APK
        run: apktool b via-decompiled -o via-custom-unsigned.apk

      - name: Sign APK
        run: |
          keytool -genkey -v -keystore release-key.jks -keyalg RSA -keysize 2048 -validity 10000 \
            -alias mykey -storepass password123 -keypass password123 \
            -dname "CN=Custom, OU=Custom, O=Custom, L=Custom, S=Custom, C=BR"
          $JAVA_HOME/bin/jarsigner -verbose -sigalg SHA1withRSA -digestalg SHA1 \
            -keystore release-key.jks -storepass password123 -keypass password123 \
            via-custom-unsigned.apk mykey
          mv via-custom-unsigned.apk via-gemini-browser.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: via-gemini-browser
          path: via-gemini-browser.apk
          retention-days: 7
