name: Build Custom APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install apktool
        run: |
          wget -q https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool -O /usr/local/bin/apktool
          wget -q https://bitbucket.org/iBotPeaches/apktool/downloads/apktool_2.9.3.jar -O /usr/local/bin/apktool.jar
          chmod +x /usr/local/bin/apktool

      - name: Download Via Browser APK
        run: |
          wget -q https://res.viayoo.com/v1/via-release.apk -O via-release.apk

      - name: Decompile APK
        run: |
          apktool d via-release.apk -o via-decompiled --no-res

      - name: Replace homepage URL
        run: |
          grep -r "viayoo\|about:blank\|homepage" via-decompiled/ --include="*.smali" --include="*.xml" -l || true
          find via-decompiled/ -type f \( -name "*.smali" -o -name "*.xml" \) | xargs grep -l "about:blank\|viayoo.com\|start_url\|homepage" 2>/dev/null | head -20
          find via-decompiled/ -type f \( -name "*.smali" -o -name "*.xml" \) -exec sed -i 's|about:blank|https://gemini.google.com/app|g' {} \;
          find via-decompiled/ -type f \( -name "*.smali" -o -name "*.xml" \) -exec sed -i 's|http://viayoo.com|https://gemini.google.com/app|g' {} \;
          find via-decompiled/ -type f -name "*.smali" -exec sed -i 's|"https://viayoo.com"|"https://gemini.google.com/app"|g' {} \;

      - name: Recompile APK
        run: |
          apktool b via-decompiled -o via-custom-unsigned.apk

      - name: Generate keystore and sign APK
        run: |
          keytool -genkey -v -keystore my-release-key.jks -keyalg RSA -keysize 2048 -validity 10000 \
            -alias mykey -storepass password123 -keypass password123 \
            -dname "CN=Custom, OU=Custom, O=Custom, L=Custom, S=Custom, C=BR"
          $JAVA_HOME/bin/jarsigner -verbose -sigalg SHA1withRSA -digestalg SHA1 \
            -keystore my-release-key.jks -storepass password123 -keypass password123 \
            via-custom-unsigned.apk mykey
          mv via-custom-unsigned.apk via-gemini-browser.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v3
        with:
          name: via-gemini-browser
          path: via-gemini-browser.apk
          retention-days: 7
